# 消融实验独立调参配置
# 仅供 scripts/train/train_ablation.py 在 --profile optimal 下使用。
# 说明：
# 1. 该文件只定义消融实验的优化训练口径，不用于单模型训练。
# 2. train_config.yaml 仅供 scripts/train/train_yolov5.py 使用。
# 3. optimal 模式允许在 profile 中为特定实验覆盖部分训练参数与 hyp。

profile: optimal
description: 每实验有限度调参的优化训练口径

rules:
  allow_hyp_override: true

global:
  # 在 optimal 模式下，先用更充分的训练周期和更稳健优化器。
  epochs: 100
  batch: 64
  img: 640
  patience: 40
  workers: 16
  cache: ram
  weights: yolov5/yolov5s.pt
  optimizer: AdamW
  label_smoothing: 0.01
  cos_lr: true
  project: outputs/ablation_study

experiments:
  # 轻量化模型通常对输入分辨率更敏感，适度提高 img 可缓解精度损失。
  ablation_exp02_ghost:
    img: 704

  ablation_exp03_shuffle:
    img: 704

  ablation_exp04_attention:
    {}

  ablation_exp05_coordatt:
    {}

  # 损失函数改进保留对应 hyp，避免被通用设置冲掉。
  ablation_exp06_siou:
    hyp: configs/ablation/hyp_siou_only.yaml

  ablation_exp07_eiou:
    hyp: configs/ablation/hyp_eiou_only.yaml

  ablation_exp08_ghost_attention:
    img: 704

  ablation_exp09_ghost_eiou:
    img: 704
    hyp: configs/ablation/hyp_eiou_only.yaml

  ablation_exp10_attention_eiou:
    hyp: configs/ablation/hyp_eiou_only.yaml

  ablation_exp11_shuffle_coordatt:
    img: 704

  ablation_exp12_shuffle_coordatt_siou:
    img: 704
    hyp: configs/ablation/hyp_siou_only.yaml

  ablation_exp13_shuffle_coordatt_eiou:
    img: 704
    hyp: configs/ablation/hyp_eiou_only.yaml
