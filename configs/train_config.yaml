# train_yolov5.py 当前实际使用的训练配置

project: outputs/weights
name: infrared_detection
exist_ok: false

data: data/processed/flir/dataset.yaml

model:
  weights: yolov5/yolov5s.pt
  cfg: null

train:
  epochs: 50
  batch_size: 16
  img_size: 640
  cache: none

optimizer:
  type: SGD

runtime:
  device: '0'
  workers: 8
  patience: 50
  cos_lr: true
  freeze: 0
  hyp: null
  resume: null
