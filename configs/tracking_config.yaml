detector:
  weights: null
  data: data/videos/thermal_test
  conf_thres: 0.25
  nms_thres: 0.45
  img_size: 640
  half: false
  warmup: true

runtime:
  tracker: deepsort
  device: '0'
  output: outputs/tracking
  show: false
  overlay: true
  fps_alpha: 0.12
  debug: false

artifacts:
  save_vid: true
  save_txt: true

trackers:
  common:
    max_age: 30
    min_hits: 3
    visible_lag: 8

  deepsort:
    iou_threshold: 0.3
    max_cosine_distance: 0.2
    nn_budget: 100

  bytetrack:
    iou_threshold: 0.3
    high_threshold: 0.5
    low_threshold: 0.1
    match_threshold: 0.3
    second_match_threshold: 0.2

  centertrack:
    iou_threshold: 0.3
    center_threshold: 50.0
    pre_threshold: 0.3
    visible_lag: 10
